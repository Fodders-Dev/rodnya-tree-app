plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}
def hasGoogleServicesConfig = file("google-services.json").exists()
if (hasGoogleServicesConfig) {
    apply plugin: 'com.google.gms.google-services'
} else {
    println "Warning: android/app/google-services.json is missing. Firebase Android auto-config is disabled for this build."
}

def releaseSigningProperties = new Properties()
def releaseSigningPropertiesPath = System.getenv("LINEAGE_RELEASE_SIGNING_PROPERTIES")
def releaseSigningPropertiesFile = releaseSigningPropertiesPath
        ? file(releaseSigningPropertiesPath)
        : rootProject.file("release-signing.properties")

if (releaseSigningPropertiesFile.exists()) {
    println "Reading release signing properties from: ${releaseSigningPropertiesFile.absolutePath}"
    releaseSigningProperties.load(new FileInputStream(releaseSigningPropertiesFile))
}

def releaseStoreFile = (releaseSigningProperties['storeFile'] ?: System.getenv("LINEAGE_KEYSTORE_FILE"))?.toString()
def releaseStorePassword = (releaseSigningProperties['storePassword'] ?: System.getenv("LINEAGE_KEYSTORE_PASSWORD"))?.toString()
def releaseKeyAlias = (releaseSigningProperties['keyAlias'] ?: System.getenv("LINEAGE_KEY_ALIAS"))?.toString()
def releaseKeyPassword = (releaseSigningProperties['keyPassword'] ?: System.getenv("LINEAGE_KEY_PASSWORD"))?.toString()
def resolveSigningFile = { String path ->
    if (path == null || path.trim().isEmpty()) {
        return null
    }

    final candidates = [
            file(path),
            rootProject.file(path),
            rootProject.file(path.replace("../", "")),
    ]

    return candidates.find { it.exists() } ?: file(path)
}
def hasReleaseSigning = [releaseStoreFile, releaseStorePassword, releaseKeyAlias, releaseKeyPassword]
        .every { it != null && !it.trim().isEmpty() }
def rustoreApplicationId = (System.getenv("LINEAGE_RUSTORE_APPLICATION_ID")
        ?: findProperty("lineageRustoreApplicationId")
        ?: "ru.rustore.app.2063621085").toString()
def rustorePushProjectId = (System.getenv("LINEAGE_RUSTORE_PUSH_PROJECT_ID")
        ?: findProperty("lineageRustorePushProjectId")
        ?: "q9oXlaEo25nBYnMe2cn3BtGpaBVWH0Mb").toString()

android {
    namespace = "com.ahjkuio.lineage_family_app"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17.toString()
    }

    signingConfigs {
        release {
            if (hasReleaseSigning) {
                storeFile resolveSigningFile(releaseStoreFile)
                storePassword releaseStorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
            } else {
                println "Warning: release signing config is missing. Set LINEAGE_RELEASE_SIGNING_PROPERTIES or LINEAGE_KEYSTORE_* env vars."
            }
        }
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.ahjkuio.lineage_family_app"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdkVersion = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
        manifestPlaceholders += [
                rustoreApplicationId : rustoreApplicationId,
                rustorePushProjectId : rustorePushProjectId,
        ]
    }

    buildTypes {
        release {
            if (hasReleaseSigning) {
                signingConfig signingConfigs.release
            }
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.1.5"
}
