plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def releaseSigningProperties = new Properties()
def readEnv = { String key ->
    def value = System.getenv(key)
    if (value == null) {
        return null
    }
    def normalized = value.toString().trim()
    return normalized.isEmpty() ? null : normalized
}
def releaseSigningPropertiesPath = readEnv("RODNYA_RELEASE_SIGNING_PROPERTIES")
def releaseSigningPropertiesFile = releaseSigningPropertiesPath
        ? file(releaseSigningPropertiesPath)
        : rootProject.file("release-signing.properties")

if (releaseSigningPropertiesFile.exists()) {
    println "Reading release signing properties from: ${releaseSigningPropertiesFile.absolutePath}"
    releaseSigningProperties.load(new FileInputStream(releaseSigningPropertiesFile))
}

def releaseStoreFile = (releaseSigningProperties['storeFile'] ?: readEnv("RODNYA_KEYSTORE_FILE"))?.toString()
def releaseStorePassword = (releaseSigningProperties['storePassword'] ?: readEnv("RODNYA_KEYSTORE_PASSWORD"))?.toString()
def releaseKeyAlias = (releaseSigningProperties['keyAlias'] ?: readEnv("RODNYA_KEY_ALIAS"))?.toString()
def releaseKeyPassword = (releaseSigningProperties['keyPassword'] ?: readEnv("RODNYA_KEY_PASSWORD"))?.toString()
def resolveSigningFile = { String path ->
    if (path == null || path.trim().isEmpty()) {
        return null
    }

    final candidates = [
            file(path),
            rootProject.file(path),
            rootProject.file(path.replace("../", "")),
    ]

    return candidates.find { it.exists() } ?: file(path)
}
def hasReleaseSigning = [releaseStoreFile, releaseStorePassword, releaseKeyAlias, releaseKeyPassword]
        .every { it != null && !it.trim().isEmpty() }
def rustoreApplicationId = (readEnv("RODNYA_RUSTORE_APPLICATION_ID")
        ?: findProperty("rodnyaRustoreApplicationId")
        ?: "ru.rustore.app.2063621085").toString()
def rustorePushProjectId = (readEnv("RODNYA_RUSTORE_PUSH_PROJECT_ID")
        ?: findProperty("rodnyaRustorePushProjectId")
        ?: "q9oXlaEo25nBYnMe2cn3BtGpaBVWH0Mb").toString()

android {
    namespace = "com.ahjkuio.rodnya_family_app"
    compileSdk = Math.max(flutter.compileSdkVersion, 35)
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17.toString()
    }

    signingConfigs {
        release {
            if (hasReleaseSigning) {
                storeFile resolveSigningFile(releaseStoreFile)
                storePassword releaseStorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
            } else {
                println "Warning: release signing config is missing. Set RODNYA_RELEASE_SIGNING_PROPERTIES or RODNYA_KEYSTORE_* env vars."
            }
        }
    }

    defaultConfig {
        applicationId = "com.ahjkuio.rodnya_family_app"
        minSdkVersion = flutter.minSdkVersion
        targetSdk = Math.max(flutter.targetSdkVersion, 35)
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    flavorDimensions += "store"

    productFlavors {
        dev {
            dimension "store"
            applicationIdSuffix ".dev"
            versionNameSuffix "-dev"
            manifestPlaceholders += [
                    rustoreApplicationId : rustoreApplicationId,
                    rustorePushProjectId : rustorePushProjectId,
            ]
        }
        rustore {
            dimension "store"
            manifestPlaceholders += [
                    rustoreApplicationId : rustoreApplicationId,
                    rustorePushProjectId : rustorePushProjectId,
            ]
        }
    }

    buildTypes {
        release {
            if (hasReleaseSigning) {
                signingConfig signingConfigs.release
            }
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.1.5"
}
