name: rodnya
description: Семейное дерево и социальная сеть для близких людей
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.16+24

environment:
  sdk: ">=2.17.0 <4.0.0"

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  
  # UI
  flutter_svg: ^2.0.0
  image_picker: ^1.1.2
  
  # Utilities
  intl: ^0.20.2
  table_calendar: ^3.1.2  # pure-Dart month grid (family calendar)
  provider: ^6.0.5
  uuid: ^4.5.1  # Более стабильная версия
  path: ^1.8.3
  url_launcher: ^6.1.11
  # 10.x wants win32 ^6 — same conflict as device_info_plus 13.
  package_info_plus: ^9.0.0
  flutter_localizations:
    sdk: flutter
  
  # Добавьте эти пакеты
  country_picker: ^2.0.20
  phone_number: ^2.0.1

  # Навигация
  go_router: ^17.0.0  # Используем последнюю стабильную версию
  

  # Добавляем зависимости для локального хранилища и синхронизации
  idb_shim: ^2.6.0  # Возвращаем версию, где должны быть нужные функции
  connectivity_plus: ^7.0.0  # Для отслеживания состояния подключения
  crypto: ^3.0.0  # SHA-256 целостность скачанного APK (OTA-апдейтер)
  shared_preferences: ^2.5.3  # Добавляем обратно для ThemeProvider
  # Android Keystore-backed storage for auth tokens. SharedPreferences
  # plaintext-stores everything; secure_storage wraps EncryptedSharedPreferences
  # on Android 23+ and KeyChain on iOS so a rooted/USB-debugger can't
  # extract session tokens by `cat`-ing the prefs file.
  flutter_secure_storage: ^9.2.2
  get_it: ^9.0.0  # Добавляем для внедрения зависимостей

  # Локальные уведомления (для foreground и каналов)
  flutter_local_notifications: ^21.0.0

  # Добавляем flutter_dotenv
  flutter_dotenv: ^6.0.0

  # Зависимости для idb_shim на мобильных
  sembast: ^3.8.4+1
  path_provider: ^2.1.5

  vector_math: ^2.1.4
  
  # Для улучшенной визуализации графов деревьев
  graphview: ^1.2.0
  sembast_web: ^2.4.1

  hive: ^2.2.3
  hive_flutter: ^1.1.0
  permission_handler: ^12.0.0+1
  flutter_contacts: ^2.0.0

  # Зависимости для RuStore (обновляем на стандартные версии)
  flutter_rustore_update: ^10.0.0
  flutter_rustore_review: ^10.0.0
  # Добавляем зависимость для In-App Billing
  flutter_rustore_billing: ^10.0.0
  # Добавляем зависимость для Push Notifications
  flutter_rustore_push: ^7.2.0
  # 13.x wants win32 ^6 — same conflict as device_info_plus 13.
  share_plus: ^11.0.0
  http: ^1.5.0
  google_sign_in: ^7.2.0
  google_sign_in_web: ^1.0.0
  # Picks up `rodnya://...` deep-link callbacks so OAuth flows
  # (Telegram / VK ID / MAX) can return into the Android app from
  # the system browser. On web we still parse Uri.base query
  # parameters; on mobile this listener forwards the URI to the
  # auth-screen handlers.
  app_links: ^7.0.0
  web_socket_channel: ^3.0.3
  # Старые git зависимости удалены

  # Добавляем пакеты для кэширования изображений и карусели
  cached_network_image: ^3.3.1
  carousel_slider: ^5.0.0
  shimmer: ^3.0.0
  record: ^6.2.0
  audioplayers: ^6.6.0
  # Profile Phase 2b-2 validation spike (2026-05-29): on-device STT.
  # Added to validate Russian recognition quality before building the
  # voice block. If the spike shows Russian is unusable on-device, this
  # dep + the spike screen get reverted (no «впечатай сам» костыль).
  speech_to_text: ^7.0.0
  video_player: ^2.9.2
  # V4 (ревью): постер (первый кадр) для исходящих видео — MediaMetadataRetriever
  # на Android. Постер грузится вместе с видео и едет в thumbnailUrl сообщения,
  # поэтому виден и отправителю, и получателю.
  video_thumbnail: ^0.5.3
  # Telegram-style in-app кружок recording. The OS native camera UI
  # (image_picker.pickVideo) felt detached — the user described it as
  # "файл отдельный". We only use it on mobile; web stays on the
  # gallery picker because <input type=file> can't drive a live
  # preview round capture loop.
  camera: ^0.12.0
  file_picker: ^11.0.0
  open_filex: ^4.5.0
  qr_flutter: ^4.1.0
  # 13.x + share_plus 13 + package_info_plus 10 all want win32 ^6.0;
  # flutter_secure_storage 9.x's transitive
  # flutter_secure_storage_windows still pins win32 ^5.5, AND
  # file_picker 11.x's Windows backend was compiled against the
  # win32-5 HRESULT typedef. A `dependency_overrides: { win32: ^6.0 }`
  # resolves at pub level but breaks Windows-target compilation
  # (file_picker_windows.dart uses HRESULT extension type semantics
  # introduced in win32 6 — old 5-style int args don't fit). Stay on
  # 12.x until either flutter_secure_storage drops the
  # flutter_secure_storage_windows 4.x line OR file_picker ships a
  # win32-6-compatible Windows backend.
  device_info_plus: ^12.0.0
  mobile_scanner: ^7.0.0

# The following adds the Cupertino Icons font to your application.
# Use with the CupertinoIcons class for iOS style icons.

  collection: any
  livekit_client: ^2.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  hive_test: ^1.0.1
  flutter_local_notifications_platform_interface: ^11.0.0
  # C1: мок path_provider в юнит-тесте ChatRecordingController (явно
  # объявляем транзитивные интерфейсы, которые импортирует тест).
  path_provider_platform_interface: ^2.1.2
  plugin_platform_interface: ^2.1.8
  # C2: мок video_player в виджет-тесте inline-кружка.
  video_player_platform_interface: ^6.7.0
  # Добавляем генератор иконок
  flutter_launcher_icons: ^0.14.3

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package

  assets:
    - assets/
    - assets/audio/
    - assets/backgrounds/
    - assets/fonts/
    # - assets/images/  # этот путь может быть удален, если не содержит файлов

  fonts:
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope-VariableFont_wght.ttf
    - family: Lora
      fonts:
        - asset: assets/fonts/Lora-VariableFont_wght.ttf
        - asset: assets/fonts/Lora-Italic-VariableFont_wght.ttf
          style: italic
    # Bundled fallback for the wide Cyrillic / Symbols / Punctuation ranges
    # that Manrope misses. Without it Flutter web emits the
    # "Could not find a set of Noto fonts" warning at runtime.
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans-VariableFont.ttf

# Конфигурация для flutter_launcher_icons
flutter_launcher_icons:
  android: true # Генерировать для Android
  ios: true # Генерировать для iOS (можно false, если не нужно)
  image_path: "assets/images/icon.png" # Путь к вашей иконке
  min_sdk_android: 21 # Укажите ваш minSdkVersion
  # web: # Конфигурация для Web, если нужно
  #   generate: true
  #   image_path: "path/to/image.png"
  #   background_color: "#hexcode"
  #   theme_color: "#hexcode"
  # windows: # Конфигурация для Windows, если нужно
  #   generate: true
  #   image_path: "path/to/image.png"
  #   icon_size: 48 # min:48, max:256, default: 48
  # macos: # Конфигурация для macOS, если нужно
  #   generate: true
  #   image_path: "path/to/image.png"
