name: Production Watch

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install backend dependencies
        run: npm --prefix backend ci

      - name: Run backend tests
        run: |
          node --test backend/test/config-env.test.js backend/test/postgres-store.test.js
          node --test backend/test/api.test.js

      - name: Create backend release archive
        run: |
          cd backend
          tar \
            --exclude=node_modules \
            --exclude=data \
            --exclude=test \
            --exclude=.gitignore \
            -czf ../rodnya-backend.tgz .

      - name: Setup server auth
        env:
          BACKEND_SERVER_PASSWORD: ${{ secrets.BACKEND_SERVER_PASSWORD }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -T 5 -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts || true
          if [ -n "$BACKEND_SERVER_PASSWORD" ]; then
            sudo apt-get update
            sudo apt-get install -y sshpass
          fi

      - name: Upload backend archive
        env:
          REMOTE_ARCHIVE: /tmp/rodnya-backend-${{ github.sha }}.tgz
          BACKEND_SERVER_USERNAME: ${{ secrets.BACKEND_SERVER_USERNAME }}
          BACKEND_SERVER_PASSWORD: ${{ secrets.BACKEND_SERVER_PASSWORD }}
        run: |
          backend_user="${BACKEND_SERVER_USERNAME:-${{ secrets.SERVER_USERNAME }}}"
          if [ -n "$BACKEND_SERVER_PASSWORD" ]; then
            sshpass -p "$BACKEND_SERVER_PASSWORD" scp \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              rodnya-backend.tgz \
              "${backend_user}@${{ secrets.SERVER_HOST }}:${REMOTE_ARCHIVE}"
          else
            scp -i ~/.ssh/id_ed25519 rodnya-backend.tgz \
              "${backend_user}@${{ secrets.SERVER_HOST }}:${REMOTE_ARCHIVE}"
          fi

      - name: Activate backend release on server
        env:
          REMOTE_ARCHIVE: /tmp/rodnya-backend-${{ github.sha }}.tgz
          BACKEND_SERVER_USERNAME: ${{ secrets.BACKEND_SERVER_USERNAME }}
          BACKEND_SERVER_PASSWORD: ${{ secrets.BACKEND_SERVER_PASSWORD }}
        run: |
          DEPLOY_LABEL="deploy ${GITHUB_SHA::7} / github-actions-backend / $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          backend_user="${BACKEND_SERVER_USERNAME:-${{ secrets.SERVER_USERNAME }}}"
          ssh_cmd=(ssh -i ~/.ssh/id_ed25519 "${backend_user}@${{ secrets.SERVER_HOST }}")
          if [ -n "$BACKEND_SERVER_PASSWORD" ]; then
            ssh_cmd=(
              sshpass -p "$BACKEND_SERVER_PASSWORD" ssh
              -o StrictHostKeyChecking=no
              -o UserKnownHostsFile=/dev/null
              "${backend_user}@${{ secrets.SERVER_HOST }}"
            )
          fi
          "${ssh_cmd[@]}" bash -s -- "${REMOTE_ARCHIVE}" "/opt/rodnya/backend" "rodnya-backend.service" "${DEPLOY_LABEL}" <<'EOF'
          set -euo pipefail
          archive="$1"
          target="$2"
          service="$3"
          label="$4"
          BUILD_LABEL="$label" /usr/local/bin/rodnya-activate-backend-release "$archive" "$target" "$service"
          rm -f "$archive"
          EOF

      - name: Backend readiness check
        env:
          RODNYA_READY_ALERT_WEBHOOK_URL: ${{ secrets.RODNYA_READY_ALERT_WEBHOOK_URL }}
        run: node tool/backend_ready_alert.mjs --url https://api.rodnya-tree.ru/ready --fail-on-warnings

      - name: Backend runtime watch
        env:
          RODNYA_RUNTIME_API_URL: https://api.rodnya-tree.ru
          RODNYA_RUNTIME_EMAIL: ${{ secrets.RODNYA_RUNTIME_EMAIL }}
          RODNYA_RUNTIME_PASSWORD: ${{ secrets.RODNYA_RUNTIME_PASSWORD }}
          RODNYA_RUNTIME_ALERT_WEBHOOK_URL: ${{ secrets.RODNYA_RUNTIME_ALERT_WEBHOOK_URL }}
          RODNYA_READY_ALERT_WEBHOOK_URL: ${{ secrets.RODNYA_READY_ALERT_WEBHOOK_URL }}
        run: node tool/backend_runtime_watch.mjs --fail-on-warnings

      - name: Install smoke tooling
        run: |
          npm ci
          npm install --no-save playwright

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Route smoke
        env:
          RODNYA_SMOKE_BASE_URL: https://rodnya-tree.ru
          RODNYA_SMOKE_API_URL: https://api.rodnya-tree.ru
          RODNYA_SMOKE_EMAIL: ${{ secrets.RODNYA_SMOKE_EMAIL }}
          RODNYA_SMOKE_PASSWORD: ${{ secrets.RODNYA_SMOKE_PASSWORD }}
          RODNYA_SMOKE_PARTNER_EMAIL: ${{ secrets.RODNYA_SMOKE_PARTNER_EMAIL }}
          RODNYA_SMOKE_PARTNER_PASSWORD: ${{ secrets.RODNYA_SMOKE_PARTNER_PASSWORD }}
          RODNYA_SMOKE_DISPLAY_NAME: Rodnya Smoke
          RODNYA_SMOKE_TREE_NAME: Rodnya Smoke Tree
          RODNYA_SMOKE_AUTO_REGISTER: "1"
          RODNYA_SMOKE_FIXTURE_TREE_ID: ${{ secrets.RODNYA_SMOKE_FIXTURE_TREE_ID }}
          RODNYA_SMOKE_CLAIM_URL: ${{ secrets.RODNYA_SMOKE_CLAIM_URL }}
          RODNYA_SMOKE_INVITE_URL: ${{ secrets.RODNYA_SMOKE_INVITE_URL }}
        run: node tool/prod_route_smoke.mjs --suite all --output-json output/playwright/prod-route-smoke.watch.json

      - name: Backup restore precheck
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USERNAME: ${{ secrets.SERVER_USERNAME }}
        run: |
          if [ -z "$SERVER_HOST" ] || [ -z "$SERVER_USERNAME" ] || [ ! -f ~/.ssh/id_ed25519 ]; then
            echo "Skipping backup restore precheck: SSH context is not configured."
            exit 0
          fi
          ssh -i ~/.ssh/id_ed25519 "${SERVER_USERNAME}@${SERVER_HOST}" \
            'bash -s -- /opt/rodnya/backups /tmp/rodnya-backup-watch' \
            < deploy/backend/verify_backup_restore_drill.sh

      - name: Upload watch artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: production-watch
          path: output/playwright
          if-no-files-found: ignore
