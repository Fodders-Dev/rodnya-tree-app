name: Deploy Rodnya Backend

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/backend-deploy.yml"
      - "backend/**"
      - "deploy/backend/**"
      - "tool/backend_ready_alert.mjs"
      - "tool/backend_runtime_watch.mjs"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend tests
        run: |
          node --test \
            backend/test/media-storage.test.js \
            backend/test/app-media-routes.test.js \
            backend/test/api.test.js \
            backend/test/postgres-store.test.js \
            backend/test/chat-utils.test.js

      - name: Create backend release archive
        run: |
          tar \
            --exclude=node_modules \
            --exclude=data \
            --exclude=test \
            --exclude=.gitignore \
            -czf rodnya-backend.tgz \
            -C backend .

      - name: Setup SSH password helper
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          set +x
          sudo apt-get update
          sudo apt-get install -y sshpass
          mkdir -p ~/.ssh
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Upload backend release archive
        env:
          REMOTE_ARCHIVE: /tmp/rodnya-backend-${{ github.sha }}.tgz
          BACKEND_SERVER_USERNAME: ${{ secrets.BACKEND_SERVER_USERNAME }}
          SSHPASS: ${{ secrets.BACKEND_SERVER_PASSWORD }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          set +x
          sshpass -e scp -o StrictHostKeyChecking=yes rodnya-backend.tgz \
            "${BACKEND_SERVER_USERNAME}@$SERVER_HOST:${REMOTE_ARCHIVE}"

      - name: Activate backend release on server
        env:
          REMOTE_ARCHIVE: /tmp/rodnya-backend-${{ github.sha }}.tgz
          BACKEND_TARGET_DIR: /opt/rodnya/backend
          BACKEND_SERVICE_NAME: rodnya-backend.service
          BACKEND_SERVER_USERNAME: ${{ secrets.BACKEND_SERVER_USERNAME }}
          SSHPASS: ${{ secrets.BACKEND_SERVER_PASSWORD }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          set +x
          DEPLOY_LABEL="deploy ${GITHUB_SHA::7} / github-actions-backend / $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          sshpass -e ssh -o StrictHostKeyChecking=yes "${BACKEND_SERVER_USERNAME}@$SERVER_HOST" \
            bash -s -- "${REMOTE_ARCHIVE}" "${BACKEND_TARGET_DIR}" "${BACKEND_SERVICE_NAME}" "${DEPLOY_LABEL}" <<'EOF'
          set -euo pipefail
          archive="$1"
          target="$2"
          service="$3"
          label="$4"
          if [ "$(id -u)" -eq 0 ]; then
            /usr/local/bin/rodnya-activate-backend-release "$archive" "$target" "$service" "$label"
          else
            sudo -n /usr/local/bin/rodnya-activate-backend-release "$archive" "$target" "$service" "$label"
          fi
          rm -f "$archive"
          EOF

      - name: Backend readiness check
        env:
          RODNYA_READY_ALERT_WEBHOOK_URL: ${{ secrets.RODNYA_READY_ALERT_WEBHOOK_URL }}
        run: node tool/backend_ready_alert.mjs --url https://api.rodnya-tree.ru/ready --fail-on-warnings

      - name: Backend runtime watch
        env:
          RODNYA_RUNTIME_API_URL: https://api.rodnya-tree.ru
          RODNYA_RUNTIME_EMAIL: ${{ secrets.RODNYA_RUNTIME_EMAIL }}
          RODNYA_RUNTIME_PASSWORD: ${{ secrets.RODNYA_RUNTIME_PASSWORD }}
          RODNYA_RUNTIME_ALERT_WEBHOOK_URL: ${{ secrets.RODNYA_RUNTIME_ALERT_WEBHOOK_URL }}
          RODNYA_READY_ALERT_WEBHOOK_URL: ${{ secrets.RODNYA_READY_ALERT_WEBHOOK_URL }}
        run: node tool/backend_runtime_watch.mjs --fail-on-warnings
