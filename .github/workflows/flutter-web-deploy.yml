name: Deploy Rodnya Web

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Install dependencies
        run: flutter pub get

      - name: Install smoke tooling
        run: npm ci

      - name: Build web
        run: flutter build web --release --dart-define=RODNYA_RUNTIME_PRESET=prod_custom_api --dart-define=RODNYA_ENABLE_LEGACY_DYNAMIC_LINKS=false --dart-define=RODNYA_GOOGLE_WEB_CLIENT_ID=676171184233-hl6gauj8c1trtn25a8me7pvm4m4clndv.apps.googleusercontent.com

      - name: Sync web shell assets
        run: node tool/sync_web_shell_assets.js

      - name: Create release archive
        run: tar -czf rodnya-site.tgz -C build/web .

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload release archive
        env:
          REMOTE_ARCHIVE: /tmp/rodnya-site-${{ github.sha }}.tgz
        run: |
          scp -i ~/.ssh/id_ed25519 rodnya-site.tgz \
            "${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_HOST }}:${REMOTE_ARCHIVE}"

      - name: Activate release on server
        env:
          REMOTE_ARCHIVE: /tmp/rodnya-site-${{ github.sha }}.tgz
        run: |
          DEPLOY_LABEL="deploy ${GITHUB_SHA::7} / github-actions / $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_HOST }}" \
            bash -s -- "${REMOTE_ARCHIVE}" "${{ secrets.DEPLOY_PATH }}" "${DEPLOY_LABEL}" <<'EOF'
          set -euo pipefail
          archive="$1"
          target="$2"
          label="$3"
          if [ "$(id -u)" -eq 0 ]; then
            BUILD_LABEL="$label" /usr/local/bin/rodnya-activate-web-release "$archive" "$target"
          else
            BUILD_LABEL="$label" sudo -n /usr/local/bin/rodnya-activate-web-release "$archive" "$target"
          fi
          rm -f "$archive"
          EOF

      - name: Backend readiness check
        env:
          RODNYA_READY_ALERT_WEBHOOK_URL: ${{ secrets.RODNYA_READY_ALERT_WEBHOOK_URL }}
        run: node tool/backend_ready_alert.mjs --url https://api.rodnya-tree.ru/ready

      - name: Backend runtime watch
        env:
          RODNYA_RUNTIME_API_URL: https://api.rodnya-tree.ru
          RODNYA_RUNTIME_EMAIL: ${{ secrets.RODNYA_RUNTIME_EMAIL }}
          RODNYA_RUNTIME_PASSWORD: ${{ secrets.RODNYA_RUNTIME_PASSWORD }}
          RODNYA_RUNTIME_ALERT_WEBHOOK_URL: ${{ secrets.RODNYA_RUNTIME_ALERT_WEBHOOK_URL }}
          RODNYA_READY_ALERT_WEBHOOK_URL: ${{ secrets.RODNYA_READY_ALERT_WEBHOOK_URL }}
        run: node tool/backend_runtime_watch.mjs --fail-on-warnings

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Route smoke after deploy
        env:
          RODNYA_SMOKE_EMAIL: ${{ secrets.RODNYA_SMOKE_EMAIL }}
          RODNYA_SMOKE_PASSWORD: ${{ secrets.RODNYA_SMOKE_PASSWORD }}
          RODNYA_SMOKE_PARTNER_EMAIL: ${{ secrets.RODNYA_SMOKE_PARTNER_EMAIL }}
          RODNYA_SMOKE_PARTNER_PASSWORD: ${{ secrets.RODNYA_SMOKE_PARTNER_PASSWORD }}
          RODNYA_SMOKE_DISPLAY_NAME: Rodnya Smoke
          RODNYA_SMOKE_TREE_NAME: Rodnya Smoke Tree
          RODNYA_SMOKE_AUTO_REGISTER: "1"
          RODNYA_SMOKE_FIXTURE_TREE_ID: ${{ secrets.RODNYA_SMOKE_FIXTURE_TREE_ID }}
          RODNYA_SMOKE_CLAIM_URL: ${{ secrets.RODNYA_SMOKE_CLAIM_URL }}
          RODNYA_SMOKE_INVITE_URL: ${{ secrets.RODNYA_SMOKE_INVITE_URL }}
        run: node tool/prod_route_smoke.mjs --base-url https://rodnya-tree.ru --api-url https://api.rodnya-tree.ru --output-json output/playwright/prod-route-smoke.ci.json

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prod-route-smoke
          path: output/playwright
          if-no-files-found: ignore
