name: Deploy Rodnya Web

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/flutter-web-deploy.yml"
      - "lib/**"
      - "web/**"
      - "assets/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - "package.json"
      - "package-lock.json"
      - "tool/backend_ready_alert.mjs"
      - "tool/backend_runtime_watch.mjs"
      - "tool/http_request_with_fallback.mjs"
      - "tool/prod_route_smoke.mjs"
      - "tool/sync_web_shell_assets.js"

# Cancel in-flight deploys when a newer push lands.
concurrency:
  group: flutter-web-deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Install dependencies
        run: flutter pub get

      - name: Install smoke tooling
        run: |
          npm ci
          npm install --no-save playwright

      - name: Build web
        run: flutter build web --release --dart-define=RODNYA_RUNTIME_PRESET=prod_custom_api --dart-define=RODNYA_ENABLE_LEGACY_DYNAMIC_LINKS=false --dart-define=RODNYA_GOOGLE_WEB_CLIENT_ID=676171184233-hl6gauj8c1trtn25a8me7pvm4m4clndv.apps.googleusercontent.com

      - name: Sync web shell assets
        run: node tool/sync_web_shell_assets.js

      - name: Pre-compress static assets (gzip + brotli)
        # main.dart.js is ~7 MB uncompressed and the user's VPS
        # got CPU-throttled by HOSTKEY when nginx had to gzip it
        # on the fly for every fresh page load. Pre-compressing
        # at build time means nginx serves the .gz / .br files
        # directly via `gzip_static on` / `brotli_static on` →
        # zero CPU cost per request and roughly 5x smaller wire
        # payload. Skip tiny files where the compression overhead
        # exceeds the savings.
        #
        # NB: requires `gzip_static on;` (and ideally
        # `brotli_static on;` if ngx_brotli is built) in the
        # nginx server block on the host. Without those, the
        # pre-compressed files just sit alongside the originals
        # and nginx keeps gzipping at runtime — no harm done.
        run: |
          set -euo pipefail
          # Files worth compressing — text-like binaries and
          # assets that the browser will fetch on initial load.
          # Skip already-compressed media (png/jpg/woff2/etc.)
          # and trivially-small files (compression cost > savings).
          find build/web -type f \( \
              -name '*.js'    -o \
              -name '*.json'  -o \
              -name '*.css'   -o \
              -name '*.wasm'  -o \
              -name '*.html'  -o \
              -name '*.svg'   -o \
              -name '*.map'   -o \
              -name '*.ttf'   \
            \) -size +1k -print0 \
            | while IFS= read -r -d '' file; do
                gzip -k -9 -- "$file"
                if command -v brotli >/dev/null 2>&1; then
                  brotli -q 11 -k -- "$file"
                fi
              done
          echo "Compressed assets summary:"
          # Count and sample the largest pairs so the workflow
          # log shows the wire-size win at a glance.
          find build/web -type f -name '*.js.gz' \
            -exec ls -lah {} \; \
            | sort -k 5 -hr | head -5

      - name: Create release archive
        run: tar -czf rodnya-site.tgz -C build/web .

      - name: Setup SSH key
        # Pass the secret via `env:` and reference it from the shell
        # via $VAR — keeps the key out of the rendered shell command
        # (GitHub masks `${{ secrets.* }}` in logs, but masking can
        # be bypassed by partial-line echoes; passing via env never
        # interpolates the value into the rendered script source at
        # all).
        env:
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          set +x
          mkdir -p ~/.ssh
          printenv SERVER_SSH_KEY > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Upload release archive
        env:
          REMOTE_ARCHIVE: /tmp/rodnya-site-${{ github.sha }}.tgz
          SERVER_USERNAME: ${{ secrets.SERVER_USERNAME }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          set +x
          scp -i ~/.ssh/id_ed25519 rodnya-site.tgz \
            "$SERVER_USERNAME@$SERVER_HOST:${REMOTE_ARCHIVE}"

      - name: Activate release on server
        env:
          REMOTE_ARCHIVE: /tmp/rodnya-site-${{ github.sha }}.tgz
          SERVER_USERNAME: ${{ secrets.SERVER_USERNAME }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set +x
          DEPLOY_LABEL="deploy ${GITHUB_SHA::7} / github-actions / $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          ssh -i ~/.ssh/id_ed25519 "$SERVER_USERNAME@$SERVER_HOST" \
            bash -s -- "${REMOTE_ARCHIVE}" "$DEPLOY_PATH" "${DEPLOY_LABEL}" <<'EOF'
          set -euo pipefail
          archive="$1"
          target="$2"
          label="$3"
          if [ "$(id -u)" -eq 0 ]; then
            BUILD_LABEL="$label" /usr/local/bin/rodnya-activate-web-release "$archive" "$target"
          else
            BUILD_LABEL="$label" sudo -n /usr/local/bin/rodnya-activate-web-release "$archive" "$target"
          fi
          rm -f "$archive"
          EOF

      - name: Backend readiness check
        env:
          RODNYA_READY_ALERT_WEBHOOK_URL: ${{ secrets.RODNYA_READY_ALERT_WEBHOOK_URL }}
        run: node tool/backend_ready_alert.mjs --url https://api.rodnya-tree.ru/ready

      - name: Backend runtime watch
        env:
          RODNYA_RUNTIME_API_URL: https://api.rodnya-tree.ru
          RODNYA_RUNTIME_EMAIL: ${{ secrets.RODNYA_RUNTIME_EMAIL }}
          RODNYA_RUNTIME_PASSWORD: ${{ secrets.RODNYA_RUNTIME_PASSWORD }}
          RODNYA_RUNTIME_ALERT_WEBHOOK_URL: ${{ secrets.RODNYA_RUNTIME_ALERT_WEBHOOK_URL }}
          RODNYA_READY_ALERT_WEBHOOK_URL: ${{ secrets.RODNYA_READY_ALERT_WEBHOOK_URL }}
        run: node tool/backend_runtime_watch.mjs --fail-on-warnings

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Route smoke after deploy
        env:
          RODNYA_SMOKE_EMAIL: ${{ secrets.RODNYA_SMOKE_EMAIL }}
          RODNYA_SMOKE_PASSWORD: ${{ secrets.RODNYA_SMOKE_PASSWORD }}
          RODNYA_SMOKE_PARTNER_EMAIL: ${{ secrets.RODNYA_SMOKE_PARTNER_EMAIL }}
          RODNYA_SMOKE_PARTNER_PASSWORD: ${{ secrets.RODNYA_SMOKE_PARTNER_PASSWORD }}
          RODNYA_SMOKE_DISPLAY_NAME: Rodnya Smoke
          RODNYA_SMOKE_TREE_NAME: Rodnya Smoke Tree
          RODNYA_SMOKE_AUTO_REGISTER: "1"
          RODNYA_SMOKE_FIXTURE_TREE_ID: ${{ secrets.RODNYA_SMOKE_FIXTURE_TREE_ID }}
          RODNYA_SMOKE_CLAIM_URL: ${{ secrets.RODNYA_SMOKE_CLAIM_URL }}
          RODNYA_SMOKE_INVITE_URL: ${{ secrets.RODNYA_SMOKE_INVITE_URL }}
        run: node tool/prod_route_smoke.mjs --base-url https://rodnya-tree.ru --api-url https://api.rodnya-tree.ru --output-json output/playwright/prod-route-smoke.ci.json

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: prod-route-smoke
          path: output/playwright
          if-no-files-found: ignore
