# /etc/nginx/sites-available/rodnya
#
# nginx is a tested fallback for rodnya-tree.ru. As of 2026-06-22
# production traffic on 80/443 is served by caddy.service, but this
# config should still pass `nginx -t` on the production host:
#
#   sudo cp deploy/nginx/rodnya.conf /etc/nginx/sites-available/rodnya
#   sudo ln -sf /etc/nginx/sites-available/rodnya /etc/nginx/sites-enabled/rodnya
#
# Before reloading make sure no stale `rodnya.conf.bak` /
# `rodnya.conf.codex` files are left in /etc/nginx/sites-enabled/ —
# they emit a "conflicting server name" warning and the wrong server
# block can win. Then:
#
#   sudo nginx -t && sudo systemctl reload nginx
#
# This file matches the production surface declared in
# deploy/caddy/Caddyfile and keeps nginx ready as a fallback.

# ─── HTTP → HTTPS redirects ──────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name rodnya-tree.ru www.rodnya-tree.ru
                api.rodnya-tree.ru
                livekit.rodnya-tree.ru
                turn.rodnya-tree.ru;
    return 301 https://$host$request_uri;
}

# ─── Marketing site + Flutter web build ──────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name rodnya-tree.ru www.rodnya-tree.ru;

    # Production certs are currently managed by Caddy. nginx is inactive
    # on 80/443, but this fallback config references the real cert store
    # so `nginx -t` remains valid on the host.
    ssl_certificate     /var/lib/caddy/.local/share/caddy/certificates/acme-v02.api.letsencrypt.org-directory/rodnya-tree.ru/rodnya-tree.ru.crt;
    ssl_certificate_key /var/lib/caddy/.local/share/caddy/certificates/acme-v02.api.letsencrypt.org-directory/rodnya-tree.ru/rodnya-tree.ru.key;

    root /var/www/rodnya-site;
    index index.html;

    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript
               application/json image/svg+xml font/woff2;
    gzip_min_length 1024;

    # ── Verified App Links manifest ──────────────────────────────────
    # Android's autoVerify pass requires Content-Type: application/json
    # exactly (some OEM builds reject `application/json; charset=utf-8`).
    # 5-min cache so a key rotation propagates fast.
    location = /.well-known/assetlinks.json {
        default_type application/json;
        add_header Cache-Control "public, max-age=300" always;
        try_files $uri =404;
    }

    # ── OAuth bridge page ────────────────────────────────────────────
    # Verified App Links route us BEFORE the browser ever loads this URL
    # on installs where assetlinks.json verification succeeded. If it
    # didn't (older Android, fresh-install pre-verification, app
    # uninstalled), this bridge HTML hops to rodnya://oauth/callback?...
    # via meta-refresh + JS, with a "Установить из RuStore" CTA fallback.
    location = /oauth/callback  { return 301 /oauth/callback/; }
    location ^~ /oauth/callback/ {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files /oauth/callback/index.html =404;
    }

    # ── Invite interstitial ──────────────────────────────────────────
    # Same idea as the OAuth bridge. A verified App Link tap OUTSIDE a
    # webview opens the app directly and never loads this. But links
    # tapped INSIDE Telegram's in-app webview are ignored by Android App
    # Links, so they land here; this static page hops to the app via
    # intent:// on the verified https App Link (no custom scheme → no APK
    # rebuild) and falls back to the web invite flow + install CTA.
    # Covers both /invite?treeId=…&personId=… and /invite/{token}.
    #
    # ⚠️ DEPLOY ORDER: the interstitial file (web/invite/index.html) ships
    # via the WEB release (flutter build web → web deploy), this config via
    # install_nginx_config.sh — two separate channels. Deploy the WEB
    # release FIRST so /invite/index.html exists, THEN reload nginx. The
    # reverse order makes /invite 404 for the window in between.
    location = /invite {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files /invite/index.html =404;
    }
    location ^~ /invite/ {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files /invite/index.html =404;
    }

    # ── Document co-authoring SPA route ──────────────────────────────
    # Falls through to the Flutter SPA so go_router can handle the
    # client-side navigation from any /doc-coauthoring/... path.
    location ^~ /doc-coauthoring {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }

    # ── SPA entry + startup manifests ────────────────────────────────
    # No-store: a stale entry html would pin the user to an old
    # version even after a deploy.
    location = / {
        try_files /index.html =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }
    location ~ ^/(index\.html|flutter_bootstrap\.js|version\.json|manifest\.json|AssetManifest\.bin\.json|AssetManifest\.json|FontManifest\.json)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files $uri =404;
    }
    location ~ ^/assets/(AssetManifest\.bin\.json|AssetManifest\.json|FontManifest\.json)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files $uri =404;
    }
    location = /favicon.ico {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    # ── Runtime bundles + push service worker ────────────────────────
    # `no-cache` (NOT `no-store`) — browser may cache, but must
    # revalidate against the server before reusing.
    location ~ ^/(flutter\.js|main\.dart\.js)$ {
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri =404;
    }
    location = /push/push-sw.js {
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    # ── Long-cached static assets ────────────────────────────────────
    location ~ ^/(assets|icons|canvaskit|splash)/ {
        add_header Cache-Control "public, max-age=86400" always;
        try_files $uri =404;
    }
    location ~ ^/(favicon\.png|apple-touch-icon\.png)$ {
        add_header Cache-Control "public, max-age=86400" always;
        try_files $uri =404;
    }

    # ── SPA fallback ─────────────────────────────────────────────────
    # Anything unmatched falls through to /index.html so go_router can
    # take over — same effect as Caddy's implicit `file_server` +
    # try_files chain.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hardening / hygiene.
    server_tokens off;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # NOTE: do NOT set Content-Security-Policy unconditionally here —
    # the Flutter web build inlines small scripts that need a matching
    # nonce/hash. If/when we tighten CSP, do it in a separate PR with
    # a reporting-only run-up.
}

# ─── api.rodnya-tree.ru → backend ────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.rodnya-tree.ru;

    ssl_certificate     /var/lib/caddy/.local/share/caddy/certificates/acme-v02.api.letsencrypt.org-directory/api.rodnya-tree.ru/api.rodnya-tree.ru.crt;
    ssl_certificate_key /var/lib/caddy/.local/share/caddy/certificates/acme-v02.api.letsencrypt.org-directory/api.rodnya-tree.ru/api.rodnya-tree.ru.key;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # Keep cumulative request body small to limit upload abuse — chat
    # attachments use a separate signed-URL flow against object
    # storage, so the API itself never streams large bodies.
    client_max_body_size 8m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Realtime websocket on /v1/realtime/ws — needs Upgrade.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    server_tokens off;
}

# ─── livekit.rodnya-tree.ru → LiveKit signaling ──────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name livekit.rodnya-tree.ru;

    ssl_certificate     /var/lib/caddy/.local/share/caddy/certificates/acme-v02.api.letsencrypt.org-directory/livekit.rodnya-tree.ru/livekit.rodnya-tree.ru.crt;
    ssl_certificate_key /var/lib/caddy/.local/share/caddy/certificates/acme-v02.api.letsencrypt.org-directory/livekit.rodnya-tree.ru/livekit.rodnya-tree.ru.key;

    location / {
        proxy_pass http://127.0.0.1:7880;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # LiveKit signaling is long-lived WebSocket. Upgrade headers
        # MUST pass through, buffering MUST be off, otherwise message
        # delivery stalls behind the proxy buffer.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
    }

    server_tokens off;
}

# ─── turn.rodnya-tree.ru → 204 marker ────────────────────────────────
# LiveKit clients hit this to verify TURN/TLS reachability. Same 204
# behaviour the Caddyfile used to declare.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name turn.rodnya-tree.ru;

    ssl_certificate     /var/lib/caddy/.local/share/caddy/certificates/acme-v02.api.letsencrypt.org-directory/turn.rodnya-tree.ru/turn.rodnya-tree.ru.crt;
    ssl_certificate_key /var/lib/caddy/.local/share/caddy/certificates/acme-v02.api.letsencrypt.org-directory/turn.rodnya-tree.ru/turn.rodnya-tree.ru.key;

    location / { return 204; }
    server_tokens off;
}
