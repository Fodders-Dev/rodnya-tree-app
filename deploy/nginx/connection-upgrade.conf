# /etc/nginx/conf.d/connection-upgrade.conf
#
# Required by the rodnya server blocks for WebSocket upgrade handling
# (api.rodnya-tree.ru's /v1/realtime/ws endpoint and the LiveKit
# signaling channel). nginx maps the Upgrade header into the
# Connection header so proxy_set_header doesn't emit a stale
# `Connection: close` on long-lived sockets.
#
# Install with:
#   sudo cp deploy/nginx/connection-upgrade.conf /etc/nginx/conf.d/
#   sudo nginx -t && sudo systemctl reload nginx

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
