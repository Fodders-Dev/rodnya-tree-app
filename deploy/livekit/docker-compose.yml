services:
  redis:
    image: redis:7.2-alpine
    container_name: rodnya-livekit-redis
    command:
      - redis-server
      - --bind
      - 127.0.0.1
      - --protected-mode
      - "yes"
      - --port
      - "6379"
      - --appendonly
      - "yes"
      - --dir
      - /data
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./redis-data:/data

  livekit:
    image: livekit/livekit-server:${LIVEKIT_IMAGE_TAG:-v1.11.0}
    container_name: rodnya-livekit
    command:
      - --config
      - /etc/livekit.yaml
    depends_on:
      - redis
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
      - /var/lib/caddy/.local/share/caddy/certificates:/var/lib/caddy/.local/share/caddy/certificates:ro
