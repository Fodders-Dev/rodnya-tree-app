<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Семейное дерево и социальная сеть для близких людей">
  <meta name="permissions-policy" content="interest-cohort=(), microphone=*, camera=*">
  <!-- Release marker: workflow-dispatch-enabled -->

  <!-- Standalone PWA flags (mobile-web-app-capable supersedes the deprecated
       apple-mobile-web-app-capable; both kept for older iOS Safari) -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Родня">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="favicon.ico"/>

  <title>Родня</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://api.rodnya-tree.ru" crossorigin>
  <link rel="dns-prefetch" href="//api.rodnya-tree.ru">
  <link rel="preload" href="main.dart.js" as="script" fetchpriority="high">
  <link rel="preload" href="icons/Icon-192.png" as="image" fetchpriority="high">

  <!-- For CORS policy -->
  <meta http-equiv="Access-Control-Allow-Origin" content="*">
  <meta http-equiv="Access-Control-Allow-Methods" content="GET, POST, PUT, DELETE">
  <meta http-equiv="Access-Control-Allow-Headers" content="Origin, X-Requested-With, Content-Type, Accept">

  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Segoe UI Variable Text", "Segoe UI", "Noto Sans",
        "Roboto", "Arial", "Segoe UI Emoji", "Apple Color Emoji",
        "Noto Color Emoji", sans-serif;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background: #f5efdf;
      color: #263226;
    }

    body {
      overflow: hidden;
    }

    #rodnya-startup {
      position: fixed;
      inset: 0;
      z-index: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #f5efdf;
    }

    .rodnya-startup__panel {
      display: grid;
      justify-items: center;
      gap: 14px;
      text-align: center;
    }

    .rodnya-startup__mark {
      width: 58px;
      height: 58px;
      border-radius: 16px;
      box-shadow: 0 18px 48px rgba(47, 125, 70, 0.22);
      object-fit: cover;
    }

    .rodnya-startup__title {
      font-size: 28px;
      line-height: 1.1;
      font-weight: 800;
      letter-spacing: 0;
    }

    .rodnya-startup__subtitle {
      font-size: 15px;
      color: rgba(38, 50, 38, 0.68);
    }

    .rodnya-startup__spinner {
      width: 26px;
      height: 26px;
      border-radius: 999px;
      border: 3px solid rgba(47, 125, 70, 0.16);
      border-top-color: #2f7d46;
      animation: rodnya-spin 900ms linear infinite;
    }

    @keyframes rodnya-spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      var startup = document.getElementById('rodnya-startup');
      if (startup) {
        startup.remove();
      }
      document.body.style.overflow = '';
    });
  </script>

  <!--
    Legacy invite link redirect.

    The web app uses hash URL strategy (rodnya-tree.ru/#/...). Older
    invite links were generated as path-segment URLs:
    https://rodnya-tree.ru/invite?treeId=...&personId=...
    When opened in a browser, nginx falls back to index.html, but
    Flutter web's hash routing then sees an empty fragment and
    drops the recipient on the home screen — treeId/personId are
    lost.

    This tiny pre-bootstrap script detects that pattern and rewrites
    to the hash form BEFORE Flutter loads, so links already in the
    wild (sent over WhatsApp/Telegram before the link-builder fix
    was deployed) still work. Cheap and reversible: when nobody is
    holding a stale link anymore, this block can come out.
  -->
  <script>
    (function () {
      try {
        var path = window.location.pathname || '';
        var search = window.location.search || '';
        var hash = window.location.hash || '';
        // Only rewrite if /invite is the path tail AND we have invite
        // params AND the hash isn't already pointing at the invite
        // route. Avoids loops if Flutter ever pushes path back.
        var isInvitePath = /(?:^|\/)invite\/?$/.test(path);
        var hasInviteParams = /[?&](?:treeId|personId)=/.test(search);
        var alreadyHashed = /^#\/invite/.test(hash);
        if (isInvitePath && hasInviteParams && !alreadyHashed) {
          var basePath = path.replace(/\/?invite\/?$/, '/');
          if (!basePath || basePath === '') basePath = '/';
          if (!basePath.endsWith('/')) basePath += '/';
          window.location.replace(basePath + '#/invite' + search);
        }
      } catch (_) {
        // Never block app boot on a redirect heuristic.
      }
    })();
  </script>

</head>
<body>
  <div id="rodnya-startup" role="status" aria-live="polite">
    <div class="rodnya-startup__panel">
      <img
        class="rodnya-startup__mark"
        src="icons/Icon-192.png"
        width="58"
        height="58"
        alt=""
        aria-hidden="true"
        decoding="async"
        fetchpriority="high"
      >
      <div class="rodnya-startup__title">Родня</div>
      <div class="rodnya-startup__subtitle">Загружаем семейный чат</div>
      <div class="rodnya-startup__spinner" aria-hidden="true"></div>
    </div>
  </div>
  <script src="flutter_bootstrap.js" async fetchpriority="high"></script>
</body>
</html>
