<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Telegram вход | Родня</title>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(68, 135, 109, 0.18), transparent 44%),
        linear-gradient(180deg, #edf5f2 0%, #f8faf8 100%);
      color: #163229;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(92vw, 440px);
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.94);
      padding: 28px;
      box-shadow: 0 24px 80px rgba(16, 61, 51, 0.16);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 28px;
      line-height: 1.15;
    }

    p {
      margin: 0 0 18px;
      line-height: 1.5;
      color: #446158;
    }

    .hint {
      margin-top: 18px;
      font-size: 14px;
    }

    .error {
      background: #fff4f4;
      color: #8f2626;
      border-radius: 18px;
      padding: 14px 16px;
      display: none;
    }

    .back-link {
      display: inline-flex;
      margin-top: 18px;
      color: #1f6e56;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Вход через Telegram</h1>
    <p>Подтвердите Telegram-аккаунт. Если он уже привязан к Родне, вход завершится автоматически.</p>
    <div id="error" class="error"></div>
    <div id="telegram-widget"></div>
    <p class="hint">После подтверждения мы вернём вас обратно на экран входа в Родню.</p>
    <a class="back-link" href="/#/login">Вернуться ко входу в Родню</a>
  </main>
  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const botUsername = (params.get("bot") || "RodnyaFamilyBot").trim();
      const authUrl = (params.get("authUrl") || "").trim();
      const errorElement = document.getElementById("error");
      const target = document.getElementById("telegram-widget");

      if (!botUsername || !authUrl) {
        errorElement.textContent = "Telegram вход временно недоступен: не передан bot или callback URL.";
        errorElement.style.display = "block";
        return;
      }

      const script = document.createElement("script");
      script.async = true;
      script.src = "https://telegram.org/js/telegram-widget.js?22";
      script.setAttribute("data-telegram-login", botUsername);
      script.setAttribute("data-size", "large");
      script.setAttribute("data-radius", "18");
      script.setAttribute("data-auth-url", authUrl);
      script.setAttribute("data-request-access", "write");
      target.appendChild(script);
    })();
  </script>
</body>
</html>
