<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="robots" content="noindex" />
  <title>Возврат в Родню…</title>
  <link rel="icon" href="/favicon.png" />
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f1e6;
      --ink: #1f2a1c;
      --ink-secondary: #3d4a37;
      --accent: #2f6f4a;
      --accent-ink: #ffffff;
      --surface: #ffffff;
      --line: rgba(31, 42, 28, 0.12);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #14180f;
        --ink: #f7f1e6;
        --ink-secondary: #d1c7b8;
        --accent: #6cc28d;
        --accent-ink: #102117;
        --surface: #1c2218;
        --line: rgba(247, 241, 230, 0.10);
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Manrope", "Segoe UI", Roboto, system-ui, sans-serif;
      background: var(--bg);
      color: var(--ink);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    main {
      width: 100%;
      max-width: 360px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 28px 22px;
      box-shadow: 0 18px 38px -22px rgba(0, 0, 0, 0.18);
      text-align: center;
    }
    .spinner {
      width: 36px;
      height: 36px;
      margin: 4px auto 18px;
      border-radius: 999px;
      border: 3px solid var(--line);
      border-top-color: var(--accent);
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    h1 {
      font-size: 18px;
      font-weight: 800;
      margin: 0 0 8px;
      letter-spacing: -0.01em;
    }
    p {
      margin: 0 0 16px;
      color: var(--ink-secondary);
      font-size: 14px;
      line-height: 1.45;
    }
    .actions {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }
    a.button {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 14px;
      text-decoration: none;
      transition: opacity 0.2s ease;
    }
    a.button.primary {
      background: var(--accent);
      color: var(--accent-ink);
    }
    a.button.secondary {
      background: transparent;
      color: var(--ink-secondary);
      border: 1px solid var(--line);
    }
    a.button:hover { opacity: 0.85; }
    small {
      display: block;
      margin-top: 14px;
      font-size: 12px;
      color: var(--ink-secondary);
      opacity: 0.75;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <main>
    <div class="spinner" id="spinner"></div>
    <h1 id="title">Открываем приложение Родня…</h1>
    <p id="subtitle">
      Возвращаемся к авторизации. Если приложение не открылось
      автоматически в течение пары секунд — нажмите кнопку ниже.
    </p>
    <div class="actions">
      <a class="button primary" id="open-app" href="#">Открыть в приложении</a>
      <a class="button secondary" id="install-rustore"
         href="https://apps.rustore.ru/app/com.ahjkuio.rodnya_family_app"
         rel="noreferrer">Установить Родню из RuStore</a>
    </div>
    <small id="diag"></small>
  </main>
  <script>
    (function () {
      // Forward every query parameter we received here onward to the
      // legacy `rodnya://oauth/callback?...` custom scheme. Verified
      // App Links — when active — would have intercepted us BEFORE
      // this page ever loaded; landing on the page means we're either
      // on a device that hasn't picked up the verification yet or one
      // where the app isn't installed. The custom-scheme hop is the
      // safety net.
      var search = window.location.search || '';
      var hash = window.location.hash || '';
      var custom = 'rodnya://oauth/callback' + search + hash;

      var openApp = document.getElementById('open-app');
      openApp.href = custom;

      // Auto-launch attempt: try the custom scheme via location
      // assignment immediately, then fall back to the install CTA
      // if nothing happened in 2.5 s (typical "scheme not handled"
      // behaviour — the page just stays put).
      var started = Date.now();
      var redirected = false;
      function attempt() {
        if (redirected) return;
        redirected = true;
        try {
          window.location.href = custom;
        } catch (err) {
          document.getElementById('diag').textContent =
              'Не удалось открыть схему: ' + (err && err.message);
        }
      }
      // Use a short delay so the page can paint first — feels more
      // intentional than an instant blink.
      setTimeout(attempt, 120);

      // If we're still on this page after 2.5 s the scheme handler
      // probably didn't fire; surface the "install" CTA more
      // prominently. If the OS HAD intercepted it, the page would
      // be backgrounded by now.
      setTimeout(function () {
        var elapsed = Date.now() - started;
        if (document.visibilityState !== 'visible') return;
        if (elapsed < 2400) return;
        document.getElementById('spinner').classList.add('hidden');
        document.getElementById('title').textContent =
            'Не удалось вернуться в приложение';
        document.getElementById('subtitle').textContent =
            'Похоже, приложение Родня не установлено или браузер ' +
            'заблокировал переход. Установите приложение из RuStore ' +
            'или нажмите «Открыть в приложении».';
      }, 2500);
    })();
  </script>
</body>
</html>
